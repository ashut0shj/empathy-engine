# Empathy Engine — docker-compose.yml
# Note: no "version:" field — it is obsolete in modern Compose and causes warnings

services:

  # Web service — starts Flask UI and REST API
  # Visit http://localhost:5000 after running
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: empathy-engine-web
    ports:
      - "5000:5000"
    volumes:
      # Generated audio files will appear in ./output/ on your host machine
      - ./output:/app/output
    environment:
      - FLASK_ENV=production
      - OUTPUT_DIR=/app/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # CLI service — for running one-off commands
  # Usage: docker compose run --rm cli python app/main.py --text "Hello!"
  cli:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: empathy-engine-cli
    volumes:
      - ./output:/app/output
    environment:
      - OUTPUT_DIR=/app/output
    entrypoint: ["python", "app/main.py"]
    command: ["--interactive"]
    stdin_open: true
    tty: true
    profiles:
      - cli